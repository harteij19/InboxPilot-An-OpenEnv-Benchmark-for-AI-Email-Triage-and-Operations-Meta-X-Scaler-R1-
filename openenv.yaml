spec_version: 1

name: inboxpilot-openenv
description: >
  InboxPilot professional email triage and operations environment.
  Simulates a realistic inbox where an AI agent must classify, prioritize,
  respond to, and route emails correctly.

version: "1.0.0"
author: InboxPilot Team

tags:
  - email
  - triage
  - operations
  - enterprise
  - decision-making

environment:
  class: app.env.InboxPilotEnv
  entry_point: app.env:InboxPilotEnv
  action_type: app.models:Action
  observation_type: app.models:Observation
  state_type: app.models:EnvironmentState
  metadata:
    deterministic: true
    supports_grading: true

tasks:
  - id: easy_support_triage
    name: Support Inbox Triage
    difficulty: easy
    description: Process mixed support emails and route correctly.
    schema: data/schemas/easy_support_triage.json
    data: data/tasks/easy_support_triage.json

  - id: medium_customer_resolution
    name: Customer Resolution Workflow
    difficulty: medium
    description: Resolve a customer complaint with escalation and follow-up.
    schema: data/schemas/medium_customer_resolution.json
    data: data/tasks/medium_customer_resolution.json

  - id: hard_exec_risk_management
    name: Executive Inbox Risk Management
    difficulty: hard
    description: Handle high-risk executive emails across security and legal themes.
    schema: data/schemas/hard_exec_risk_management.json
    data: data/tasks/hard_exec_risk_management.json

app:
  module: app.main
  object: app
  host: 0.0.0.0
  port: 7860

server:
  module: server.app
  object: mcp
  entrypoint: server.app:main

endpoints:
  - name: reset
    method: POST
    path: /reset
  - name: step
    method: POST
    path: /step
  - name: state
    method: GET
    path: /state
  - name: tasks
    method: GET
    path: /tasks
  - name: health
    method: GET
    path: /health

runtime:
  python: "3.11"
  framework: fastapi
  web_server: uvicorn
  mode: multi
